<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#14181F" />
<title>ニュートラル・ノート</title>
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="apple-touch-icon" href="./icon-192.png" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#14181F; --surface:#1C222B; --surface2:#232B36; --line:#2E3845;
    --ink:#E9E5DB; --sub:#8C95A3; --ai:#7FA0BD; --ember:#C98A63;
    --fact:#8FB8A0; --warn:#D4B36A;
    --serif:"Noto Serif JP","Hiragino Mincho ProN","Yu Mincho",serif;
    --sans:"Noto Sans JP","Hiragino Sans",sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--bg); color:var(--ink); font-family:var(--sans);
    font-size:15px; line-height:1.75; -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .wrap{max-width:560px; margin:0 auto; padding:max(28px,env(safe-area-inset-top)) 18px calc(80px + env(safe-area-inset-bottom));}
  h1{font-family:var(--serif); font-weight:500; font-size:24px; letter-spacing:.3em; margin:0;}
  .tag{color:var(--sub); font-size:12px; margin:6px 0 0; letter-spacing:.06em;}
  header{margin-bottom:24px;}
  nav{display:flex; gap:8px; margin-bottom:20px; align-items:center;}
  .tab{font-family:var(--sans); cursor:pointer; font-size:13px; padding:7px 14px;
       background:transparent; color:var(--sub); border:1px solid transparent; border-radius:8px;}
  .tab.on{background:var(--surface2); color:var(--ink); border-color:var(--line);}
  .flash{color:var(--fact); font-size:12px;}
  .grid{display:grid; gap:16px;}
  .card{background:var(--surface); border:1px solid var(--line); border-radius:10px; padding:16px;}
  .card.sm{padding:14px;}
  .label{font-family:var(--sans); font-size:11px; letter-spacing:.18em; color:var(--sub); margin-bottom:8px;}
  .steps{display:flex; gap:6px; align-items:center;}
  .steps span{font-size:11px; letter-spacing:.12em; color:var(--sub); border-bottom:1px solid transparent; padding-bottom:2px;}
  .steps span.on{color:var(--ink); border-bottom-color:var(--ai);}
  textarea{width:100%; background:var(--bg); color:var(--ink); border:1px solid var(--line);
    border-radius:8px; padding:12px; font-family:var(--serif); font-size:15px; line-height:1.9; resize:vertical;}
  textarea:focus{outline:none; border-color:var(--ai);}
  .row{display:flex; justify-content:space-between; align-items:center;}
  .right{text-align:right;}
  .btn{font-family:var(--sans); cursor:pointer; background:transparent; color:var(--ink);
    border:1px solid var(--line); border-radius:8px; padding:11px 18px; font-size:14px; transition:opacity .15s;}
  .btn.primary{background:var(--ai); color:#10141A; border:none; font-weight:700;}
  .btn.sm{padding:6px 12px; font-size:13px;}
  .btn:disabled{opacity:.4; cursor:default;}
  .chips{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:18px;}
  .chip{font-family:var(--serif); font-size:14px; cursor:pointer; padding:6px 14px; border-radius:999px;
    background:transparent; color:var(--ink); border:1px solid var(--line);}
  .chip.on{background:var(--ember); color:#10141A; border-color:var(--ember);}
  input[type=range]{width:100%; accent-color:var(--ember);}
  .big{font-family:var(--serif); font-size:28px; color:var(--ember); text-align:center; margin:4px 0 12px;}
  .hint{font-size:12px; color:var(--warn); margin:10px 0 0;}
  .mh{font-size:12px; letter-spacing:.15em; margin-bottom:4px;}
  .mline{margin:2px 0; font-family:var(--serif);}
  .q{font-family:var(--serif); font-size:17px; line-height:2; margin:0 0 14px;}
  .micnote{font-size:11px; color:var(--sub); margin:8px 0 0;}
  .entry-meta{font-size:12px; color:var(--sub);}
  .entry-text{font-family:var(--serif); font-size:14px; line-height:1.9; margin:8px 0 0; white-space:pre-wrap;}
  .entry-ans{font-family:var(--serif); font-size:14px; color:var(--ai); margin:8px 0 0; border-left:2px solid var(--ai); padding-left:10px; white-space:pre-wrap;}
  .del{background:none; border:none; color:var(--sub); cursor:pointer; font-size:12px;}
  .muted{color:var(--sub); font-size:14px;}
  svg.water{width:100%; display:block;}
  /* 窓（リフレーミングカード） */
  .frame{cursor:pointer; border:1px solid var(--line); border-radius:10px; padding:12px 14px; background:var(--bg); transition:border-color .15s, background .15s;}
  .frame.on{border-color:var(--ai); background:rgba(127,160,189,.08);}
  .frame .ft{font-family:var(--serif); font-size:15px; color:var(--ai); margin:0 0 4px;}
  .frame .fb{font-family:var(--serif); font-size:14px; line-height:1.9; margin:0;}
  .keyin{width:100%; background:var(--bg); color:var(--ink); border:1px solid var(--line); border-radius:8px; padding:10px 12px; font-size:14px; font-family:var(--sans);}
  .keyin:focus{outline:none; border-color:var(--ai);}
  a.tel{color:var(--ai); text-decoration:none; border-bottom:1px solid var(--ai);}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
"use strict";

/* ニュートラル・ノート — Android PWA
   思想: AIは助言しない。鏡として「事実/解釈/べき」を映し、問いを一つ返す。
   「窓」は指示ではなく、別の見方の可能性をそっと差し出すだけ（命令形禁止）。
   保存: localStorage（キー 'nn-entries'）。
   AI: APIキー（⚙で設定・端末内のみ保存）があれば鏡と窓にClaudeを使う。
       未設定/オフラインでも簡易仕分け＋定型の窓で完結する。 */

var C = { ai:"#7FA0BD", ember:"#C98A63", sub:"#8C95A3", ink:"#E9E5DB" };
var EMOTIONS = ["不安","怒り","悲しみ","焦り","孤独","罪悪感","むなしさ","恐れ","悔しさ","安堵","喜び","静けさ"];
var STORAGE_KEY = "nn-entries";

var QUESTIONS = [
  "この出来事が何かのメッセージだとしたら、本当はどうしたい？",
  "事実だけを見たとき、いま本当に困っていることは何だろう？",
  "その『べき』は、誰の声だろう？",
  "10年後の自分なら、いまの自分に何と言うだろう？",
  "怖れているのは、起きたことそのもの？ それとも、これから起きると想像していること？",
  "いま、いちばん大切にしたいものは何だろう？",
  "もし誰も責めなくていいとしたら、最初に何を手放す？"
];

/* ---- 保存 ---- */
function loadEntries(){
  try{ var r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : []; }
  catch(e){ return []; }
}
function saveEntries(entries){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); }
  catch(e){ console.error(e); }
}

/* ---- ローカルの「べき」検出 ---- */
function detectShoulds(text){
  var patterns = [
    /[^。\n]*(?:すべき|べきだ|べきで|べきな)[^。\n]*/g,
    /[^。\n]*(?:しなければ|せねば|しないと(?:いけ|だめ)|ねばならな)[^。\n]*/g,
    /[^。\n]*(?:はずだ|はずなのに)[^。\n]*/g
  ];
  var found = [];
  for(var i=0;i<patterns.length;i++){
    var m = text.match(patterns[i]);
    if(m) for(var j=0;j<m.length;j++){ var s=m[j].trim(); if(found.indexOf(s)<0) found.push(s); }
  }
  return found;
}

/* ---- ローカルの鏡（AIなし・ことばの簡易仕分け） ---- */
var INTERP_MARKERS = ["かもしれ","と思","きっと","どうせ","たぶん","多分","気がする","に違いない","だろう",
  "なんで","なぜ","どうして","感じ","気持ち","嫌","いや","不安","怖","こわ","つらい","辛い","悲し","寂し",
  "さみし","心配","最悪","ダメ","だめ","嫌い","きらい","むかつ","腹が立","ひどい","酷い"];
function buildMirror(text, emotions){
  var shoulds = detectShoulds(text);
  var sentences = text.split(/(?<=[。！？\n])/);
  var facts = [], interps = [];
  for(var i=0;i<sentences.length;i++){
    var s = sentences[i].replace(/[。！？\n]+$/,"").trim();
    if(!s) continue;
    var isShould = false;
    for(var k=0;k<shoulds.length;k++){ if(s.indexOf(shoulds[k])>=0 || shoulds[k].indexOf(s)>=0){ isShould=true; break; } }
    if(isShould) continue;
    var isInterp = false;
    for(var m=0;m<INTERP_MARKERS.length;m++){ if(s.indexOf(INTERP_MARKERS[m])>=0){ isInterp=true; break; } }
    (isInterp?interps:facts).push(s);
  }
  var qi = (text.length + (emotions.length?emotions[0].length:0)) % QUESTIONS.length;
  return { facts:facts.slice(0,5), interpretations:interps.slice(0,5), shoulds:shoulds.slice(0,3), question:QUESTIONS[qi] };
}

/* ---- Claude API（キーはこの端末のlocalStorageのみ。サーバーには置かない） ---- */
var API_KEY_STORAGE = "nn-api-key";
var MODEL = "claude-sonnet-4-6";
function getApiKey(){ try{ return localStorage.getItem(API_KEY_STORAGE)||""; }catch(e){ return ""; } }
function setApiKey(k){ try{ if(k) localStorage.setItem(API_KEY_STORAGE, k); else localStorage.removeItem(API_KEY_STORAGE); }catch(e){} }

function callClaude(prompt, maxTokens){
  return fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{
      "content-type":"application/json",
      "x-api-key": getApiKey(),
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true"
    },
    body: JSON.stringify({ model:MODEL, max_tokens:maxTokens||900,
      messages:[{role:"user", content:prompt}] })
  }).then(function(res){
    if(!res.ok) throw new Error("API "+res.status);
    return res.json();
  }).then(function(data){
    var raw = (data.content||[]).map(function(b){ return b.text||""; }).join("")
      .replace(/```json|```/g,"").trim();
    return JSON.parse(raw);
  });
}

/* ---- AIの鏡（助言禁止のプロンプト） ---- */
function mirrorPrompt(){
  return 'あなたは「鏡」です。助言・励まし・解決策・評価を一切しません。\n'
    + '以下の文章を読み、次のJSONだけを返してください。前置き・コードフェンス禁止。\n\n'
    + '{"facts": ["客観的に起きた事実（短文、最大4つ）"],\n'
    + ' "interpretations": ["書き手の頭の中の解釈・推測・物語（短文、最大4つ）"],\n'
    + ' "shoulds": ["文中の『〜すべき』『〜しなければ』等の思い込み表現（原文のまま、最大3つ）"],\n'
    + ' "question": "書き手が自分の本音に気づくための、開かれた問いをひとつ。問いのみ。"}\n\n'
    + '文章:\n' + S.text + '\n\n'
    + '選んだ感情: ' + (S.emotions.join("、")||"未選択") + '（強さ ' + S.intensity + '/100）';
}
function aiMirror(){
  var forText = S.text;
  callClaude(mirrorPrompt(), 1000).then(function(m){
    if(S.text!==forText || S.step<2) return; // 書き直されていたら破棄
    if(m && m.facts){ S.mirror=m; S.mirrorState="ai"; render(); }
  }).catch(function(e){ console.error(e); if(S.text===forText){ S.mirrorState="error"; render(); } });
}

/* ---- 窓（リフレーミング）: 指示しない・断定しない・否定しない ---- */
var CRISIS_WORDS = ["死にたい","消えたい","いなくなりたい","自殺","死のう","死んだほうが",
  "死ねば","終わりにしたい","生きていたくない","生きるのをやめ","リストカット"];
function detectCrisis(text){
  for(var i=0;i<CRISIS_WORDS.length;i++){ if(text.indexOf(CRISIS_WORDS[i])>=0) return true; }
  return false;
}
var FALLBACK_FRAMES = [
  {title:"友人の窓", body:"もし親友が同じことで悩んでいたら、あなたはどんな言葉をかけるだろう。その言葉は、自分にも向けていいのかもしれない。"},
  {title:"時間の窓", body:"10年後のあなたがこの日を振り返ったとき、何がいちばん記憶に残っているだろう。今日の出来事の大きさは、少し違って見えるかもしれない。"},
  {title:"反証の窓", body:"いちばん強い『解釈』と逆のことが起きた場面を、ひとつだけ思い出せるだろうか。例外があるなら、それは絶対ではないのかもしれない。"}
];
function windowPrompt(){
  var m = S.mirror||{};
  return 'あなたは「窓」です。書き手が同じ出来事を別の窓から眺められるように、'
    + '「こういう見方もできるかもしれない」という可能性をそっと差し出します。\n\n'
    + 'ルール:\n'
    + '- 助言・指示・励まし・評価はしない。命令形・「〜すべき」「〜しましょう」を使わない\n'
    + '- 断定しない。「〜かもしれない」「〜という見方もある」の形で書く\n'
    + '- 書き手の感情を否定しない（「大したことではない」等は禁止）\n'
    + '- 各bodyは100字以内。書き手の文章の具体的な内容に触れること\n'
    + '- 文章に自傷や希死念慮の兆候がある場合は {"crisis": true} だけを返す\n\n'
    + '窓の種類の例: 友人の窓（親友が同じ状況なら）/ 時間の窓（10年後から見ると）/ '
    + '反証の窓（逆の証拠・例外）/ 引きの窓（一歩引いた俯瞰）/ からだの窓（体の感覚に戻る）\n\n'
    + '次のJSONだけを返す（前置き・コードフェンス禁止）:\n'
    + '{"crisis": false, "frames": [{"title": "〇〇の窓", "body": "..."}, {"title": "...", "body": "..."}, {"title": "...", "body": "..."}]}\n\n'
    + '文章:\n' + S.text + '\n\n'
    + '鏡の仕分け: 事実=' + JSON.stringify(m.facts||[]) + ' / 解釈=' + JSON.stringify(m.interpretations||[])
    + ' / べき=' + JSON.stringify(m.shoulds||[]) + '\n'
    + '選んだ感情: ' + (S.emotions.join("、")||"未選択") + '（強さ ' + S.intensity + '/100）';
}
function openWindow(){
  S.step=4; S.chosenIdx=null; S.intensityAfter=null;
  if(detectCrisis(S.text)){ S.win={state:"crisis"}; render(); return; }
  if(!getApiKey()){ S.win={state:"done", frames:FALLBACK_FRAMES, source:"fallback"}; render(); return; }
  S.win={state:"loading"}; render();
  callClaude(windowPrompt(), 900).then(function(r){
    if(r && r.crisis){ S.win={state:"crisis"}; }
    else if(r && r.frames && r.frames.length){ S.win={state:"done", frames:r.frames.slice(0,3), source:"ai"}; }
    else { S.win={state:"done", frames:FALLBACK_FRAMES, source:"fallback"}; }
    render();
  }).catch(function(e){ console.error(e); S.win={state:"error"}; render(); });
}

/* ---- 心の水位（SVG） ---- */
function waterSvg(entries){
  var pts = entries.slice(-30);
  if(pts.length < 2){
    return '<p class="muted" style="line-height:1.8">記録が2件たまると、不安度の水位線がここに現れます。</p>';
  }
  var W=320,H=120,pad=8;
  var xs=[], ys=[];
  for(var i=0;i<pts.length;i++){
    xs.push(pad + (i*(W-pad*2))/(pts.length-1));
    // 窓のあとに測り直した値があればそちら（=その日の最終的な水位）
    var inten = (pts[i].intensityAfter!=null) ? pts[i].intensityAfter
              : (pts[i].intensity==null?50:pts[i].intensity);
    ys.push(H-pad - (inten/100)*(H-pad*2));
  }
  var path="";
  for(var j=0;j<xs.length;j++){ path += (j===0?"M":"L") + xs[j].toFixed(1) + "," + ys[j].toFixed(1) + " "; }
  var area = path + "L"+xs[xs.length-1]+","+(H-pad)+" L"+xs[0]+","+(H-pad)+" Z";
  var lastPt = pts[pts.length-1];
  var last = (lastPt.intensityAfter!=null) ? lastPt.intensityAfter
           : (lastPt.intensity==null?50:lastPt.intensity);
  return '<svg class="water" viewBox="0 0 '+W+' '+H+'" aria-label="不安度の推移">'
    + '<defs><linearGradient id="w" x1="0" y1="0" x2="0" y2="1">'
    + '<stop offset="0%" stop-color="'+C.ai+'" stop-opacity="0.35"/>'
    + '<stop offset="100%" stop-color="'+C.ai+'" stop-opacity="0.02"/></linearGradient></defs>'
    + '<path d="'+area+'" fill="url(#w)"/>'
    + '<path d="'+path+'" fill="none" stroke="'+C.ai+'" stroke-width="1.5"/>'
    + '<circle cx="'+xs[xs.length-1]+'" cy="'+ys[ys.length-1]+'" r="3" fill="'+C.ai+'"/></svg>'
    + '<p style="color:'+C.sub+';font-size:12px;margin:4px 0 0">直近の不安度 '
    + '<span style="color:'+C.ink+';font-family:var(--serif);font-size:16px">'+last+'</span> / 100（最新'+pts.length+'件）</p>';
}

/* ---- 状態 ---- */
var S = {
  tab:"write", entries:loadEntries(),
  step:0, text:"", emotions:[], intensity:50, mirror:null, mirrorState:"local", answer:"",
  win:null, chosenIdx:null, intensityAfter:null,
  savedFlash:false, keyFlash:""
};

function esc(s){ return String(s).replace(/[&<>"]/g, function(c){ return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]; }); }

/* ---- 描画 ---- */
var app = document.getElementById("app");
var STEP_NAMES = ["書く","感じる","鏡","問い","窓"];

function render(){
  var h = '';
  h += '<header><h1>ニュートラル・ノート</h1>'
     + '<p class="tag">変えない。還る。— 助言をしない記録帳</p></header>';

  h += '<nav>'
     + '<button class="tab '+(S.tab==="write"?"on":"")+'" data-tab="write">書く</button>'
     + '<button class="tab '+(S.tab==="log"?"on":"")+'" data-tab="log">水位と記録</button>'
     + '<button class="tab '+(S.tab==="set"?"on":"")+'" data-tab="set" aria-label="設定">⚙</button>'
     + (S.savedFlash?'<span class="flash">保存しました</span>':'')
     + '</nav>';

  if(S.tab==="write") h += renderWrite();
  else if(S.tab==="set") h += renderSet();
  else h += renderLog();

  app.innerHTML = h;
  wire();
}

function renderWrite(){
  var h = '<div class="grid">';
  // 段階
  h += '<div class="steps">';
  for(var i=0;i<STEP_NAMES.length;i++){
    h += '<span class="'+(i===S.step?"on":"")+'">'+STEP_NAMES[i]+(i<STEP_NAMES.length-1?"　":"")+'</span>';
  }
  h += '</div>';

  if(S.step===0){
    var sc = detectShoulds(S.text).length;
    h += '<div class="card"><div class="label">いま、頭の中にあるもの</div>'
      + '<textarea id="ta-text" rows="8" placeholder="整えなくていい。出てくる順に、そのまま。">'+esc(S.text)+'</textarea>'
      + '<p class="micnote">声で書くなら、キーボードの🎤マイクキーを押して話してください。</p>'
      + '<p class="hint" id="should-hint" style="'+(sc>0?'':'display:none')+'">「べき・ねば」が <b id="should-n">'+sc+'</b> か所。あとで鏡が映します。</p>'
      + '<div class="right" style="margin-top:14px">'
      + '<button class="btn primary" id="to-1" '+(S.text.trim().length<5?'disabled':'')+'>つぎへ</button></div>'
      + '</div>';
  }

  if(S.step===1){
    h += '<div class="card"><div class="label">解決しない。ただ、名前をつけて測る</div><div class="chips">';
    for(var e=0;e<EMOTIONS.length;e++){
      var on = S.emotions.indexOf(EMOTIONS[e])>=0;
      h += '<button class="chip '+(on?"on":"")+'" data-emo="'+EMOTIONS[e]+'">'+EMOTIONS[e]+'</button>';
    }
    h += '</div><div class="label">不安度（いまの体感）</div>'
      + '<input type="range" min="0" max="100" id="inten" value="'+S.intensity+'" aria-label="不安度">'
      + '<div class="big" id="inten-v">'+S.intensity+'</div>'
      + '<div class="row"><button class="btn" id="to-0b">もどる</button>'
      + '<button class="btn primary" id="to-2">つぎへ</button></div></div>';
  }

  if(S.step===2){
    if(!S.mirror){
      S.mirror = buildMirror(S.text, S.emotions);
      if(getApiKey()){ S.mirrorState="loading"; aiMirror(); }
      else S.mirrorState="local";
    }
    var m = S.mirror;
    var mnote = S.mirrorState==="loading" ? 'AIの鏡で読み直しています…（先に簡易の仕分けを表示しています）'
      : S.mirrorState==="ai" ? 'AIの鏡が映しました。'
      : S.mirrorState==="error" ? '通信できなかったため、ことばの簡易仕分けです。'
      : '';
    h += '<div class="card"><div class="label">鏡 — 助言はしない。映すだけ</div>';
    h += '<p class="muted" style="margin:0 0 14px">書いた文章を「起きた事実」と「頭の中の解釈」に仕分けました。判断や励ましはありません。</p>';
    if(mnote) h += '<p class="micnote" style="margin:0 0 12px">'+mnote+'</p>';
    h += '<div class="grid">';
    h += '<div><div class="mh" style="color:'+C.ember.replace(C.ember,"#8FB8A0")+'">起きた事実</div>';
    if(m.facts.length){ for(var f=0;f<m.facts.length;f++) h += '<p class="mline">・'+esc(m.facts[f])+'</p>'; }
    else h += '<p class="mline" style="color:'+C.sub+'">（事実らしい記述は拾えませんでした）</p>';
    h += '</div>';
    h += '<div><div class="mh" style="color:#D4B36A">頭の中の解釈</div>';
    if(m.interpretations.length){ for(var p=0;p<m.interpretations.length;p++) h += '<p class="mline" style="color:'+C.sub+'">・'+esc(m.interpretations[p])+'</p>'; }
    else h += '<p class="mline" style="color:'+C.sub+'">（解釈らしい記述は拾えませんでした）</p>';
    h += '</div>';
    if(m.shoulds.length){
      h += '<div><div class="mh" style="color:#D4B36A">「べき・ねば」</div>';
      for(var s=0;s<m.shoulds.length;s++) h += '<p class="mline" style="color:#D4B36A">・'+esc(m.shoulds[s])+'</p>';
      h += '</div>';
    }
    h += '</div>';
    h += '<div class="row" style="margin-top:14px"><button class="btn" id="to-1b">もどる</button>'
      + '<button class="btn primary" id="to-3">つぎへ</button></div></div>';
  }

  if(S.step===3){
    var q = (S.mirror && S.mirror.question) || "この出来事が、何かのメッセージだとしたら——本当はどうしたい？";
    h += '<div class="card"><div class="label">問い</div>'
      + '<p class="q">'+esc(q)+'</p>'
      + '<textarea id="ta-ans" rows="4" placeholder="答えは自分の中から。書けなければ空欄のままでいい。">'+esc(S.answer)+'</textarea>'
      + '<p class="micnote">声で書くなら、キーボードの🎤マイクキーを押して話してください。</p>'
      + '<div class="row" style="margin-top:14px"><button class="btn" id="to-2b">もどる</button>'
      + '<span><button class="btn" id="save">記録して閉じる</button> '
      + '<button class="btn primary" id="to-4">窓をひらく</button></span></div>'
      + '<p class="micnote" style="margin-top:10px">窓 = この出来事を別の見方から眺めてみる（任意）。</p></div>';
  }

  if(S.step===4){
    h += renderWindow();
  }

  h += '</div>';
  return h;
}

/* ---- 窓の画面 ---- */
function renderWindow(){
  var h = '<div class="card"><div class="label">窓 — 指示しない。別の景色を見せるだけ</div>';
  var w = S.win || {state:"error"};

  if(w.state==="loading"){
    h += '<p class="muted">別の窓を探しています…</p>'
      + '<div style="margin-top:12px"><button class="btn sm" id="to-3b">もどる</button></div>';
  }
  else if(w.state==="crisis"){
    h += '<p class="q" style="margin-bottom:10px">いま、かなり苦しいところにいるように読めました。</p>'
      + '<p class="muted" style="margin:0 0 14px">こういうときは、見方を変えるより、人の声につながるほうが先だと思います。よければ、ここに。</p>'
      + '<p class="mline">・#いのちSOS <a class="tel" href="tel:0120061338">0120-061-338</a>（24時間）</p>'
      + '<p class="mline">・よりそいホットライン <a class="tel" href="tel:0120279338">0120-279-338</a>（24時間・無料）</p>'
      + '<p class="mline">・いのちの電話 <a class="tel" href="tel:0570783556">0570-783-556</a>（10〜22時）</p>'
      + '<p class="micnote" style="margin-top:12px">この記録はいつもどおり、あなたの端末の中だけに保存されます。</p>'
      + '<div class="right" style="margin-top:14px"><button class="btn primary" id="save2">記録して閉じる</button></div>';
  }
  else if(w.state==="error"){
    h += '<p class="muted">窓をひらけませんでした。通信を確認して、もう一度どうぞ。</p>'
      + '<div class="row" style="margin-top:14px"><button class="btn sm" id="to-3b">もどる</button>'
      + '<span><button class="btn sm" id="win-retry">もう一度</button> '
      + '<button class="btn primary" id="save2">窓を使わず閉じる</button></span></div>';
  }
  else { // done
    h += '<p class="muted" style="margin:0 0 14px">どれか一枚、いま覗けそうな窓があれば。なければ選ばずに閉じていい。</p>';
    if(w.source==="fallback"){
      h += '<p class="micnote" style="margin:0 0 12px">定型の窓です。⚙でAPIキーを設定すると、書いた内容に合わせた窓になります。</p>';
    }
    h += '<div class="grid">';
    for(var i=0;i<w.frames.length;i++){
      var f = w.frames[i];
      h += '<div class="frame '+(S.chosenIdx===i?"on":"")+'" data-frame="'+i+'">'
        + '<p class="ft">'+esc(f.title)+'</p><p class="fb">'+esc(f.body)+'</p></div>';
    }
    h += '</div>';
    if(S.chosenIdx!=null){
      var av = (S.intensityAfter==null ? S.intensity : S.intensityAfter);
      h += '<div style="margin-top:18px"><div class="label">この窓から見たあとの、いまの体感</div>'
        + '<input type="range" min="0" max="100" id="inten2" value="'+av+'" aria-label="窓のあとの不安度">'
        + '<div class="big" id="inten2-v">'+av+'</div></div>';
    }
    h += '<div class="row" style="margin-top:14px"><button class="btn" id="to-3b">もどる</button>'
      + '<button class="btn primary" id="save2">記録して閉じる</button></div>';
  }
  h += '</div>';
  return h;
}

/* ---- 設定画面 ---- */
function renderSet(){
  var has = !!getApiKey();
  var h = '<div class="grid">';
  h += '<div class="card"><div class="label">AI（鏡と窓）— Claude APIキー</div>'
    + '<p class="muted" style="margin:0 0 12px">キーを設定すると、鏡の仕分けと「窓」が書いた内容に合わせたものになります。'
    + '未設定でも、簡易の仕分けと定型の窓で全部使えます。</p>'
    + '<p class="muted" style="margin:0 0 12px">現在: <b style="color:'+(has?C.ai:C.sub)+'">'+(has?"設定済み":"未設定")+'</b></p>'
    + '<input type="password" class="keyin" id="key-in" placeholder="sk-ant-..." autocomplete="off">'
    + '<div class="row" style="margin-top:12px">'
    + '<button class="btn sm" id="key-clear" '+(has?'':'disabled')+'>削除</button>'
    + '<button class="btn primary sm" id="key-save">保存</button></div>'
    + (S.keyFlash?'<p class="micnote" style="margin-top:10px;color:'+C.ai+'">'+esc(S.keyFlash)+'</p>':'')
    + '<p class="micnote" style="margin-top:12px">キーはこの端末のブラウザ内（localStorage）にだけ保存され、'
    + 'Anthropicとの通信以外には使われません。発行は console.anthropic.com から。</p></div>';
  h += '<div class="card"><div class="label">つらいとき（いつでも）</div>'
    + '<p class="mline">・#いのちSOS <a class="tel" href="tel:0120061338">0120-061-338</a>（24時間）</p>'
    + '<p class="mline">・よりそいホットライン <a class="tel" href="tel:0120279338">0120-279-338</a>（24時間・無料）</p>'
    + '<p class="mline">・いのちの電話 <a class="tel" href="tel:0570783556">0570-783-556</a>（10〜22時）</p></div>';
  h += '</div>';
  return h;
}

function renderLog(){
  var h = '<div class="grid">';
  h += '<div class="card"><div class="label">心の水位 — 不安度の推移</div>'+waterSvg(S.entries)+'</div>';
  var rev = S.entries.slice().reverse();
  for(var i=0;i<rev.length;i++){
    var e = rev[i];
    var d = new Date(e.date).toLocaleDateString("ja-JP",{month:"short",day:"numeric",weekday:"short"});
    var emo = (e.emotions||[]).join("・");
    var t = e.text.length>120 ? e.text.slice(0,120)+"…" : e.text;
    var intenLabel = '不安 '+e.intensity + (e.intensityAfter!=null ? ' → '+e.intensityAfter : '');
    h += '<div class="card sm"><div class="row" style="align-items:baseline">'
      + '<span class="entry-meta">'+d+'　'+esc(emo)+'　<span style="color:'+C.ember+'">'+intenLabel+'</span></span>'
      + '<button class="del" data-del="'+e.id+'" aria-label="この記録を消す">消す</button></div>'
      + '<p class="entry-text">'+esc(t)+'</p>'
      + (e.answer?'<p class="entry-ans">'+esc(e.answer)+'</p>':'')
      + (e.window && e.window.title ? '<p class="entry-ans" style="border-left-color:'+C.ai+'">〔'+esc(e.window.title)+'〕'+esc(e.window.body||'')+'</p>' : '')
      + '</div>';
  }
  if(S.entries.length===0) h += '<p class="muted">まだ記録がありません。「書く」から始められます。</p>';
  h += '</div>';
  return h;
}

/* ---- イベント結線 ---- */
function wire(){
  var tabs = app.querySelectorAll("[data-tab]");
  tabs.forEach(function(b){ b.onclick=function(){ S.tab=b.getAttribute("data-tab"); render(); }; });

  // step0
  var ta = document.getElementById("ta-text");
  if(ta){
    ta.oninput = function(){
      S.text = ta.value;
      var n = detectShoulds(S.text).length;
      var hint = document.getElementById("should-hint");
      var hn = document.getElementById("should-n");
      if(hn) hn.textContent = n;
      if(hint) hint.style.display = n>0 ? "" : "none";
      var nx = document.getElementById("to-1");
      if(nx) nx.disabled = S.text.trim().length<5;
    };
  }
  var to1 = document.getElementById("to-1"); if(to1) to1.onclick=function(){ S.step=1; render(); };

  // step1
  var chips = app.querySelectorAll("[data-emo]");
  chips.forEach(function(b){ b.onclick=function(){
    var e=b.getAttribute("data-emo"); var i=S.emotions.indexOf(e);
    if(i>=0) S.emotions.splice(i,1); else S.emotions.push(e); render();
  };});
  var inten = document.getElementById("inten");
  if(inten) inten.oninput=function(){ S.intensity=Number(inten.value); var v=document.getElementById("inten-v"); if(v) v.textContent=S.intensity; };
  var to0b=document.getElementById("to-0b"); if(to0b) to0b.onclick=function(){ S.step=0; render(); };
  var to2=document.getElementById("to-2"); if(to2) to2.onclick=function(){ S.step=2; S.mirror=null; render(); };

  // step2
  var to1b=document.getElementById("to-1b"); if(to1b) to1b.onclick=function(){ S.step=1; render(); };
  var to3=document.getElementById("to-3"); if(to3) to3.onclick=function(){ S.step=3; render(); };

  // step3
  var taA=document.getElementById("ta-ans");
  if(taA){
    taA.oninput=function(){ S.answer=taA.value; };
  }
  var to2b=document.getElementById("to-2b"); if(to2b) to2b.onclick=function(){ S.step=2; render(); };
  var saveB=document.getElementById("save"); if(saveB) saveB.onclick=doSave;
  var to4=document.getElementById("to-4"); if(to4) to4.onclick=openWindow;

  // step4（窓）
  var to3b=document.getElementById("to-3b"); if(to3b) to3b.onclick=function(){ S.step=3; render(); };
  var retry=document.getElementById("win-retry"); if(retry) retry.onclick=openWindow;
  var save2=document.getElementById("save2"); if(save2) save2.onclick=doSave;
  var frames = app.querySelectorAll("[data-frame]");
  frames.forEach(function(el){ el.onclick=function(){
    var i=Number(el.getAttribute("data-frame"));
    S.chosenIdx = (S.chosenIdx===i ? null : i);
    if(S.chosenIdx!=null && S.intensityAfter==null) S.intensityAfter=S.intensity;
    render();
  };});
  var inten2 = document.getElementById("inten2");
  if(inten2) inten2.oninput=function(){ S.intensityAfter=Number(inten2.value); var v=document.getElementById("inten2-v"); if(v) v.textContent=S.intensityAfter; };

  // 設定（APIキー）
  var keySave=document.getElementById("key-save");
  if(keySave) keySave.onclick=function(){
    var v=(document.getElementById("key-in").value||"").trim();
    if(!v){ S.keyFlash="キーが空です。"; render(); return; }
    setApiKey(v); S.keyFlash="保存しました（この端末のみ）。"; render();
  };
  var keyClear=document.getElementById("key-clear");
  if(keyClear) keyClear.onclick=function(){ setApiKey(""); S.keyFlash="削除しました。"; render(); };

  // log delete
  var dels = app.querySelectorAll("[data-del]");
  dels.forEach(function(b){ b.onclick=function(){
    var id=Number(b.getAttribute("data-del"));
    S.entries = S.entries.filter(function(x){ return x.id!==id; });
    saveEntries(S.entries); render();
  };});
}

function doSave(){
  var win = null;
  if(S.win && S.win.state==="crisis") win = { crisis:true };
  else if(S.win && S.win.state==="done" && S.chosenIdx!=null){
    var f = S.win.frames[S.chosenIdx];
    win = { title:f.title, body:f.body, source:S.win.source||"ai" };
  }
  var entry = {
    id:Date.now(), date:new Date().toISOString(),
    text:S.text, emotions:S.emotions, intensity:S.intensity,
    mirror:S.mirror||null, answer:S.answer,
    window:win, intensityAfter:(S.intensityAfter==null?null:S.intensityAfter)
  };
  S.entries = S.entries.concat([entry]);
  saveEntries(S.entries);
  S.text=""; S.emotions=[]; S.intensity=50; S.mirror=null; S.mirrorState="local"; S.answer="";
  S.win=null; S.chosenIdx=null; S.intensityAfter=null; S.step=0;
  S.savedFlash=true; S.tab="log"; render();
  setTimeout(function(){ S.savedFlash=false; render(); }, 2200);
}

render();

/* ---- Service Worker 登録（オフライン化） ---- */
if("serviceWorker" in navigator){
  window.addEventListener("load", function(){
    navigator.serviceWorker.register("./sw.js").catch(function(e){ console.log("SW登録失敗",e); });
  });
}
</script>
